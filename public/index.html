<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #app {
            height: 100%;
            display: flex;
        }

        /* Sidebar Styles */
        #sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 600;
            color: var(--primary);
        }

        .user-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .user-list-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: background 0.2s;
            cursor: pointer;
        }

        .user-item:hover {
            background: var(--bg);
        }

        .user-item.self {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 0.875rem;
        }

        .user-info {
            flex-grow: 1;
        }

        .user-name {
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.125rem;
        }

        .user-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            width: 100%;
            padding: 0.625rem;
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fee2e2;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        /* Map Styles */
        #map-container {
            flex-grow: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* Auth Styles */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
        }

        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            width: 100%;
            max-width: 400px;
        }

        .auth-card h2 {
            margin: 0 0 0.5rem 0;
            text-align: center;
            font-weight: 700;
            font-size: 1.75rem;
        }

        .auth-card p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            background: var(--primary-hover);
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .toggle-auth a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .hidden { display: none !important; }

        .error-msg {
            background: #fef2f2;
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            text-align: center;
            border: 1px solid #fee2e2;
        }

        /* Marker Styles */
        .custom-marker {
            width: 30px;
            height: 30px;
            border-radius: 50% 50% 50% 0;
            background: var(--primary);
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -15px 0 0 -15px;
            border: 2px solid white;
            box-shadow: var(--shadow);
        }

        .custom-marker.self {
            background: var(--success);
        }

        .custom-marker::after {
            content: '';
            width: 12px;
            height: 12px;
            margin: 7px 0 0 7px;
            background: white;
            position: absolute;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Auth Container -->
        <div id="auth-container" class="auth-overlay">
            <div id="login-card" class="auth-card">
                <h2>Welcome Back</h2>
                <p>Login to track and share your location</p>
                <div id="login-error" class="error-msg hidden"></div>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="login-username" placeholder="Username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••">
                    </div>
                </div>
                <button class="auth-btn" onclick="handleLogin()">Login</button>
                <div class="toggle-auth">
                    Don't have an account? <a href="#" onclick="showRegister()">Sign Up</a>
                </div>
            </div>

            <div id="register-card" class="auth-card hidden">
                <h2>Create Account</h2>
                <p>Join the real-time location network</p>
                <div id="reg-error" class="error-msg hidden"></div>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="reg-username" placeholder="Choose a username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="••••••••">
                    </div>
                </div>
                <button class="auth-btn" onclick="handleRegister()">Sign Up</button>
                <div class="toggle-auth">
                    Already have an account? <a href="#" onclick="showLogin()">Login</a>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div id="sidebar" class="hidden">
            <div class="sidebar-header">
                <h1>LiveTrack</h1>
                <i class="fa-solid fa-satellite-dish"></i>
            </div>
            <div class="user-list-container">
                <div class="user-list-title">Active Users</div>
                <div id="user-list">
                    <!-- Users will be injected here -->
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </button>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
